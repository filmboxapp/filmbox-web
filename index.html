<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reproductor Minimalista - Custom Controls</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: #0f0f0f;
        font-family: system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
    }
    
    .player-container {
        width: 100%;
        max-width: 960px;
        background: #111;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    
    #custom-player {
        width: 100%;
        height: 540px;
        background: #000;
        position: relative;
    }
    
    .overlay-controls {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0,0,0,0.85));
        padding: 20px 25px 15px;
        opacity: 0;
        transition: opacity 0.3s;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    
    .player-container:hover .overlay-controls {
        opacity: 1;
    }
    
    .progress-bar {
        height: 6px;
        background: rgba(255,255,255,0.2);
        border-radius: 9999px;
        position: relative;
        cursor: pointer;
    }
    
    .progress {
        height: 100%;
        background: #00ff9d;
        width: 0%;
        border-radius: 9999px;
        transition: width 0.1s linear;
    }
    
    .controls {
        display: flex;
        align-items: center;
        gap: 18px;
        color: white;
    }
    
    .svg-icon {
        width: 28px;
        height: 28px;
        cursor: pointer;
        transition: transform 0.2s;
        fill: #fff;
    }
    
    .svg-icon:hover {
        transform: scale(1.15);
        fill: #00ff9d;
    }
    
    .time {
        font-size: 13px;
        font-family: monospace;
        color: #aaa;
        min-width: 90px;
    }
    
    .volume-slider {
        width: 90px;
        accent-color: #00ff9d;
    }
    
    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>
<body>

<div class="player-container">
    <div id="custom-player">
        <iframe id="video-frame" allowfullscreen></iframe>
        
        <!-- Controles personalizados -->
        <div class="overlay-controls">
            <div class="progress-bar" id="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            
            <div class="controls">
                <svg onclick="togglePlay()" class="svg-icon" id="play-icon" viewBox="0 0 24 24">
                    <path d="M8 5.14v14.72c0 .61.67.98 1.21.65l11.32-7.36c.5-.32.5-1.08 0-1.4L9.21 4.49C8.67 4.16 8 4.53 8 5.14z"/>
                </svg>
                
                <svg onclick="toggleMute()" class="svg-icon" id="volume-icon" viewBox="0 0 24 24">
                    <path d="M3 9v6h4l5 5V4L7 9H3z"/>
                    <path d="M16 9a4 4 0 0 1 0 6" id="volume-path"/>
                </svg>
                
                <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.01" value="1">
                
                <div class="time" id="time">00:00 / 00:00</div>
                
                <div style="flex: 1"></div>
                
                <svg onclick="toggleFullscreen()" class="svg-icon" viewBox="0 0 24 24">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 7v2h3v3h2V5h-5z"/>
                </svg>
            </div>
        </div>
    </div>
</div>

<script>
// ===================== CONFIGURACIÓN =====================
let currentUrl = "";
let isPlaying = true;
let isMuted = false;
let volume = 1;

// Ejemplos de embeds (puedes añadir más)
const embedExamples = {
    streamwish: "https://streamwish.to/e/xxxxxxxxxxxx",
    // Añade más dominios según necesites
};

// Función para cargar cualquier iframe (Streamwish, etc)
function loadVideo(url) {
    currentUrl = url;
    const iframe = document.getElementById('video-frame');
    iframe.src = url;
    
    // Removemos sandbox restrictivo
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-presentation allow-forms allow-popups');
}

// Controles
function togglePlay() {
    const iframe = document.getElementById('video-frame');
    const icon = document.getElementById('play-icon');
    
    // Intentamos comunicarnos con el reproductor del iframe (funciona en algunos embeds)
    try {
        iframe.contentWindow.postMessage({action: isPlaying ? 'pause' : 'play'}, '*');
    } catch(e) {}
    
    isPlaying = !isPlaying;
    
    if (isPlaying) {
        icon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
    } else {
        icon.innerHTML = `<path d="M8 5.14v14.72c0 .61.67.98 1.21.65l11.32-7.36c.5-.32.5-1.08 0-1.4L9.21 4.49C8.67 4.16 8 4.53 8 5.14z"/>`;
    }
}

function toggleMute() {
    isMuted = !isMuted;
    const volumeIcon = document.getElementById('volume-icon');
    const path = document.getElementById('volume-path');
    
    if (isMuted) {
        path.setAttribute('d', 'M16.5 7.5L19 10m0 0l2.5 2.5M19 10l2.5-2.5M19 10l-2.5 2.5');
        document.getElementById('volume').value = 0;
    } else {
        path.setAttribute('d', 'M16 9a4 4 0 0 1 0 6');
        document.getElementById('volume').value = volume;
    }
    
    try {
        document.getElementById('video-frame').contentWindow.postMessage({
            action: isMuted ? 'mute' : 'unmute',
            volume: isMuted ? 0 : volume
        }, '*');
    } catch(e) {}
}

document.getElementById('volume').addEventListener('input', (e) => {
    volume = parseFloat(e.target.value);
    isMuted = volume === 0;
    
    try {
        document.getElementById('video-frame').contentWindow.postMessage({
            action: 'volume',
            value: volume
        }, '*');
    } catch(e) {}
});

function toggleFullscreen() {
    const container = document.getElementById('custom-player');
    if (!document.fullscreenElement) {
        container.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

// Barra de progreso simulada (muchos embeds no exponen tiempo real)
let progressInterval;
function startFakeProgress() {
    let progress = 0;
    const progressEl = document.getElementById('progress');
    
    clearInterval(progressInterval);
    progressInterval = setInterval(() => {
        progress = (progress + 0.8) % 100;
        progressEl.style.width = `${progress}%`;
        
        const current = Math.floor((progress/100) * 125);
        const total = 125;
        document.getElementById('time').textContent = 
            `${Math.floor(current/60).toString().padStart(2,'0')}:${(current%60).toString().padStart(2,'0')} / ` +
            `${Math.floor(total/60).toString().padStart(2,'0')}:${(total%60).toString().padStart(2,'0')}`;
    }, 800);
}

// Click en barra de progreso
document.getElementById('progress-bar').addEventListener('click', (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    document.getElementById('progress').style.width = `${percent * 100}%`;
    
    try {
        document.getElementById('video-frame').contentWindow.postMessage({
            action: 'seek',
            percent: percent
        }, '*');
    } catch(e) {}
});

// =================== USO ===================
// Ejemplo de uso:
window.onload = () => {
    // Cambia esta URL por tu embed de Streamwish, Filemoon, etc.
    loadVideo("https://streamwish.to/e/TU_CODIGO_AQUI");
    
    startFakeProgress();
    
    // Ejemplo: puedes llamar desde consola o botones:
    // loadVideo("https://tu-embed.com/e/abc123");
};

// Permite cargar desde URL con parámetro
const params = new URLSearchParams(window.location.search);
if (params.has('url')) {
    loadVideo(params.get('url'));
}
</script>

</body>
</html>
