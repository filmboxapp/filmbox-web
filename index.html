<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FilmBox Play - Generador de Reproductor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #fff;
        font-family: system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .container {
        width: 100%;
        max-width: 700px;
        background: #111;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 20px 50px rgba(0,255,157,0.1);
    }
    h1 { text-align: center; margin-bottom: 30px; color: #00ff9d; }
    textarea {
        width: 100%;
        height: 120px;
        background: #1a1a1a;
        border: 2px solid #333;
        border-radius: 10px;
        color: white;
        padding: 15px;
        font-size: 16px;
        resize: vertical;
    }
    button {
        margin-top: 20px;
        width: 100%;
        padding: 16px;
        background: #00ff9d;
        color: black;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
    }
    button:hover { background: #00cc7a; }
    .info {
        margin-top: 25px;
        padding: 15px;
        background: #1a1a1a;
        border-radius: 8px;
        font-size: 14px;
        color: #aaa;
    }
</style>
</head>
<body>

<div class="container">
    <h1>FilmBox Play - Generador</h1>
    <p style="text-align:center; color:#888; margin-bottom:20px;">
        Pega el embed de Audinifer, Streamwish, etc.
    </p>
    
    <textarea id="embed-input" placeholder="https://audinifer.com/e/se6hsjirtr18"></textarea>
    
    <button onclick="generarReproductor()">GENERAR REPRODUCTOR</button>
    
    <div class="info">
        <strong>Cómo funciona:</strong><br>
        1. Pega el link del embed<br>
        2. Presiona el botón<br>
        3. Te dará un link directo al reproductor con tus controles minimalistas<br>
        <br>
        <strong>Nota:</strong> El reproductor se abre en una página limpia sin controles originales.
    </div>
</div>

<script>
function generarReproductor() {
    let url = document.getElementById('embed-input').value.trim();
    
    if (!url) {
        alert("Por favor pega un embed válido");
        return;
    }
    
    // Codificamos la URL para pasarla por parámetro
    let encodedUrl = encodeURIComponent(url);
    let playerUrl = `player.html?url=${encodedUrl}`;
    
    // Abrimos directamente el reproductor (no el generador)
    window.open(playerUrl, '_blank');
}
</script>

</body>
</html>
